paths:
  # 1. 홈 화면 정보 조회
  /api/home:
    get:
      summary: 홈 화면 정보 조회 (통합)
      description: |
        홈 화면에 필요한 목표 정보, 달성 진행률, 주간 캘린더 요약,
        오늘의 할 일, 추천 활동을 한 번에 조회합니다.
      tags:
        - Home
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType: { type: string, example: "SUCCESS" }
                  error: { type: object, nullable: true, example: null }
                  success:
                    type: object
                    properties:
                      userName: { type: string, example: "지은" }
                      goalStatus: { type: string, example: "ACTIVE" }
                      currentGoal:
                        type: object
                        nullable: true
                        properties:
                          goalId: { type: integer, example: 2 }
                          title: { type: string, example: "갓생 살기 프로젝트" }
                          startDate: { type: string, example: "2026-02-01" }
                          endDate: { type: string, example: "2026-02-28" }
                          dDay: { type: string, example: "D-13" }
                          growthRatio: { type: integer, example: 70 }
                          restRatio: { type: integer, example: 30 }
                      progress:
                        type: object
                        properties:
                          growthAchieved: { type: integer, example: 5 }
                          restAchieved: { type: integer, example: 2 }
                      weeklySummary:
                        type: object
                        properties:
                          weekStartDate: { type: string, example: "2026-02-15" }
                          days:
                            type: array
                            items:
                              type: object
                              properties:
                                date: { type: string, example: "2026-02-16" }
                                hasItems: { type: boolean, example: true }
                                todoCount: { type: integer, example: 1 }
                                schedules:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      id: { type: integer, example: 101 }
                                      title: { type: string, example: "카페 알바" }
                                      type: { type: string, example: "FIXED", description: "고정 일정 여부" }
                                      category: { type: string, example: "GROWTH" }
                                      status: { type: string, example: "TODO" }
                                      point: { type: integer, example: 20 }
                                      color: { type: integer, example: 1, description: "캘린더 표시 색상 인덱스" }
                                      startTime: { type: string, example: "18:00" }
                                      endTime: { type: string, example: "22:00" }
                                      completed: { type: boolean, example: false }
                      todayTodos:
                        type: array
                        items:
                          type: object
                          properties:
                            todoId: { type: integer, example: 12 }
                            title: { type: string, example: "자격증 공부하기" }
                            type: { type: string, example: "NORMAL" }
                            category: { type: string, example: "GROWTH" }
                            point: { type: integer, example: 10 }
                            color: { type: integer, example: 1 }
                            startTime: { type: string, example: "14:00" }
                            endTime: { type: string, example: "16:00" }
                            completed: { type: boolean, example: false }
                      recommendations:
                        type: array
                        items:
                          type: object
                          properties:
                            activityId: { type: integer, example: 10 }
                            title: { type: string, example: "마케팅 공모전" }
                            subTitle: { type: string, example: "삼성전자" }
                            dDay: { type: string, example: "D-5" }
                            imageUrl: { type: string, example: "https://..." }
                            tags: { type: array, items: { type: string }, example: ["#공모전", "#마케팅"] }

  # 2. 스케줄 완료 상태 변경 (투두 체크박스)
  /api/home/schedules/{activityId}/status:
    patch:
      summary: 오늘의 할 일(투두) 완료 상태 토글
      description: |
        사용자의 개인 일정(UserActivity)의 상태를 TODO <-> DONE으로 변경합니다.
      tags:
        - Home
      security:
        - bearerAuth: []
      parameters:
        - name: activityId
          in: path
          required: true
          description: "상태를 변경할 투두 스케줄의 ID"
          schema:
            type: integer
            example: 12
      responses:
        "200":
          description: 상태 변경 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType: { type: string, example: "SUCCESS" }
                  success:
                    type: object
                    properties:
                      id: { type: integer, example: 12 }
                      status: { type: string, example: "DONE" }