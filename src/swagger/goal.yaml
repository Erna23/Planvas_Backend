tags:
  - name: Goal
    description: 목표(Goal Period) 관리 API

components:
  schemas:
    ErrorObject:
      type: object
      required: [errorCode, reason, data]
      properties:
        errorCode:
          type: string
          description: 서비스 에러 코드
          example: "G400"
        reason:
          type: string
          description: 에러 사유(메시지)
          example: "목표 정보를 찾을 수 없습니다."
        data:
          nullable: true
          description: 추가 데이터(없으면 null)
          example: null

    FailResponse:
      type: object
      required: [resultType, error, success]
      properties:
        resultType:
          type: string
          enum: [FAIL]
          example: "FAIL"
        error:
          $ref: "#/components/schemas/ErrorObject"
        success:
          nullable: true
          example: null

  responses:
    FailResponse:
      description: 공통 FAIL 응답
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FailResponse"

paths:
  /api/goals:
    post:
      summary: 목표 생성
      tags: [Goal]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, startDate, endDate]
              properties:
                presetId:
                  type: integer
                  nullable: true
                  description: 프리셋을 쓰는 경우 presetId
                  example: 2
                title:
                  type: string
                  example: "2024 상반기 목표"
                startDate:
                  type: string
                  description: "YYYY-MM-DD"
                  example: "2024-01-01"
                endDate:
                  type: string
                  description: "YYYY-MM-DD"
                  example: "2024-06-30"
                targetGrowthRatio:
                  type: integer
                  description: 목표 성장 비율 (미입력 시 50)
                  example: 60
                targetRestRatio:
                  type: integer
                  description: 목표 휴식 비율 (미입력 시 50)
                  example: 40
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: "SUCCESS"
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      goalId:
                        type: integer
                        example: 10
                      title:
                        type: string
                        example: "2024 상반기 목표"
                      startDate:
                        type: string
                        example: "2024-01-01"
                      endDate:
                        type: string
                        example: "2024-06-30"
                      createdAt:
                        type: string
                        format: date-time
                        example: "2024-01-01T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/FailResponse"
        "401":
          $ref: "#/components/responses/FailResponse"
        "409":
          $ref: "#/components/responses/FailResponse"
        "500":
          $ref: "#/components/responses/FailResponse"

  /api/goals/current:
    get:
      summary: 현재 진행 중 목표 조회
      tags: [Goal]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공 (진행 중 목표 없으면 goalId=null)
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: "SUCCESS"
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      goalId:
                        type: integer
                        nullable: true
                        example: 10
                      title:
                        type: string
                        example: "2024 상반기 목표"
                      startDate:
                        type: string
                        example: "2024-01-01"
                      endDate:
                        type: string
                        example: "2024-06-30"
                      growthRatio:
                        type: integer
                        description: 목표(타겟) 성장 비율
                        example: 60
                      restRatio:
                        type: integer
                        description: 목표(타겟) 휴식 비율
                        example: 40
                      currentGrowthRatio:
                        type: integer
                        description: 실제 기록 기반 성장 비율
                        example: 55
                      currentRestRatio:
                        type: integer
                        description: 실제 기록 기반 휴식 비율
                        example: 45
                      presetType:
                        type: string
                        example: "CUSTOM"
                      presetId:
                        nullable: true
                        example: null
        "401":
          $ref: "#/components/responses/FailResponse"
        "500":
          $ref: "#/components/responses/FailResponse"

  /api/goals/ratio-presets:
    get:
      summary: 목표 비율 프리셋 목록
      tags: [Goal]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: "SUCCESS"
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      presets:
                        type: array
                        items:
                          type: object
                          properties:
                            presetId:
                              type: integer
                              example: 1
                            title:
                              type: string
                              example: "파워 갓생러 🔥"
                            description:
                              type: string
                              example: "이번 시즌, 후회 없이 모든 걸 쏟아붓고 싶은 분"
                            growthRatio:
                              type: integer
                              example: 90
                            restRatio:
                              type: integer
                              example: 10
        "401":
          $ref: "#/components/responses/FailResponse"
        "500":
          $ref: "#/components/responses/FailResponse"

  /api/goals/{goalId}:
    get:
      summary: 목표 상세 조회 (기간 + 타겟 비율)
      tags: [Goal]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: goalId
          required: true
          schema:
            type: integer
          description: 목표 ID
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: "SUCCESS"
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      goalId:
                        type: integer
                        example: 10
                      title:
                        type: string
                        example: "2024 상반기 목표"
                      startDate:
                        type: string
                        example: "2024-01-01"
                      endDate:
                        type: string
                        example: "2024-06-30"
                      growthRatio:
                        type: integer
                        example: 60
                      restRatio:
                        type: integer
                        example: 40
                      presetType:
                        type: string
                        example: "CUSTOM"
                      presetId:
                        nullable: true
                        example: null
        "400":
          $ref: "#/components/responses/FailResponse"
        "401":
          $ref: "#/components/responses/FailResponse"
        "403":
          $ref: "#/components/responses/FailResponse"
        "404":
          $ref: "#/components/responses/FailResponse"
        "500":
          $ref: "#/components/responses/FailResponse"

    patch:
      summary: 목표 기간/이름 수정
      description: |
        목표의 title, startDate, endDate를 부분 수정합니다.
        - 최소 1개 필드는 필수 (title/startDate/endDate 중 하나)
        - 날짜 형식: YYYY-MM-DD
      tags: [Goal]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: goalId
          required: true
          schema:
            type: integer
          description: 목표 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: "2024 하반기 목표"
                startDate:
                  type: string
                  description: "YYYY-MM-DD"
                  example: "2024-07-01"
                endDate:
                  type: string
                  description: "YYYY-MM-DD"
                  example: "2024-12-31"
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: "SUCCESS"
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      goalId:
                        type: integer
                        example: 10
                      title:
                        type: string
                        example: "2024 하반기 목표"
                      startDate:
                        type: string
                        example: "2024-07-01"
                      endDate:
                        type: string
                        example: "2024-12-31"
                      growthRatio:
                        type: integer
                        example: 60
                      restRatio:
                        type: integer
                        example: 40
        "400":
          $ref: "#/components/responses/FailResponse"
        "401":
          $ref: "#/components/responses/FailResponse"
        "403":
          $ref: "#/components/responses/FailResponse"
        "404":
          $ref: "#/components/responses/FailResponse"
        "500":
          $ref: "#/components/responses/FailResponse"

  /api/goals/{goalId}/ratio:
    patch:
      summary: 목표 성장/휴식 비율 수정
      tags: [Goal]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: goalId
          required: true
          schema:
            type: integer
          description: 목표 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [growthRatio, restRatio]
              properties:
                growthRatio:
                  type: integer
                  example: 70
                restRatio:
                  type: integer
                  example: 30
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: "SUCCESS"
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      goalId:
                        type: integer
                        example: 10
                      growthRatio:
                        type: integer
                        example: 70
                      restRatio:
                        type: integer
                        example: 30
        "400":
          $ref: "#/components/responses/FailResponse"
        "401":
          $ref: "#/components/responses/FailResponse"
        "403":
          $ref: "#/components/responses/FailResponse"
        "404":
          $ref: "#/components/responses/FailResponse"
        "500":
          $ref: "#/components/responses/FailResponse"

  /api/goals/{goalId}/progress:
    get:
      summary: 목표 진행 비율 조회 (현재 성장/휴식 비율)
      tags: [Goal]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: goalId
          required: true
          schema:
            type: integer
          description: 목표 ID
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: "SUCCESS"
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      goalId:
                        type: integer
                        example: 10
                      currentGrowthRatio:
                        type: integer
                        example: 55
                      currentRestRatio:
                        type: integer
                        example: 45
        "400":
          $ref: "#/components/responses/FailResponse"
        "401":
          $ref: "#/components/responses/FailResponse"
        "403":
          $ref: "#/components/responses/FailResponse"
        "404":
          $ref: "#/components/responses/FailResponse"
        "500":
          $ref: "#/components/responses/FailResponse"
