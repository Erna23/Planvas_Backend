paths:
  /api/cart/activities:
    get:
      summary: 장바구니 조회
      description: |
        장바구니에 담긴 활동 목록을 조회합니다.
        탭(성장/휴식) 별로 필터링하여 조회합니다.
      tags:
        - Cart
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: tab
          required: true
          schema:
            type: string
            enum: [GROWTH, REST]
          description: GROWTH 또는 REST
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: SUCCESS
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      tab:
                        type: string
                        example: GROWTH
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            cartItemId:
                              type: integer
                              description: 장바구니 아이템 ID (삭제 시 사용)
                              example: 30
                            activityId:
                              type: integer
                              example: 601
                            title:
                              type: string
                              example: 독서 30분
                            category:
                              type: string
                              example: GROWTH
                            point:
                              type: integer
                              example: 30
                            thumbnailUrl:
                              type: string
                              nullable: true
                              example: string
        "400":
          description: 요청 값이 올바르지 않습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: FAIL
                  error:
                    type: object
                    properties:
                      reason:
                        type: string
                        example: 요청 값이 올바르지 않습니다.
                      data:
                        nullable: true
                        example: null
                  success:
                    nullable: true
                    example: null
        "401":
          description: 인증 실패
        "500":
          description: 장바구니를 불러올 수 없습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: FAIL
                  error:
                    type: object
                    properties:
                      reason:
                        type: string
                        example: 장바구니를 불러올 수 없습니다.
                      data:
                        nullable: true
                        example: null
                  success:
                    nullable: true
                    example: null

    post:
      summary: 장바구니 담기
      description: |
        활동을 장바구니에 추가합니다.
        활동 탐색/상세 화면에서 “담기” 버튼 클릭 시 사용됩니다.
      tags:
        - Cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [activityId]
              properties:
                activityId:
                  type: integer
                  example: 601
      responses:
        "200":
          description: 추가 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: SUCCESS
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      cartItemId:
                        type: integer
                        example: 30
                      activityId:
                        type: integer
                        example: 601
                      message:
                        type: string
                        example: 장바구니에 추가되었습니다.
        "400":
          description: 요청 값이 올바르지 않습니다.
        "401":
          description: 인증 실패
        "404":
          description: 해당 활동을 찾을 수 없습니다.
        "409":
          description: 이미 장바구니에 담긴 활동입니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: FAIL
                  error:
                    type: object
                    properties:
                      reason:
                        type: string
                        example: 이미 장바구니에 담긴 활동입니다.
                      data:
                        nullable: true
                        example: null
                  success:
                    nullable: true
                    example: null
        "500":
          description: 장바구니 추가에 실패했습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: FAIL
                  error:
                    type: object
                    properties:
                      reason:
                        type: string
                        example: 장바구니 추가에 실패했습니다.
                      data:
                        nullable: true
                        example: null
                  success:
                    nullable: true
                    example: null

  /api/cart/activities/{cartItemId}:
    delete:
      summary: 장바구니 삭제
      description: |
        장바구니에서 활동을 제거합니다.
        장바구니 목록에서 삭제 버튼 클릭 시 사용됩니다.
      tags:
        - Cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cartItemId
          required: true
          schema:
            type: integer
          description: 장바구니 항목 ID
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: SUCCESS
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      deleted:
                        type: boolean
                        example: true
        "401":
          description: 인증 실패
        "404":
          description: 삭제할 활동을 찾을 수 없습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: FAIL
                  error:
                    type: object
                    properties:
                      reason:
                        type: string
                        example: 삭제할 활동을 찾을 수 없습니다.
                      data:
                        nullable: true
                        example: null
                  success:
                    nullable: true
                    example: null
        "500":
          description: 삭제할 활동을 찾을 수 없습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: FAIL
                  error:
                    type: object
                    properties:
                      reason:
                        type: string
                        example: 삭제할 활동을 찾을 수 없습니다.
                      data:
                        nullable: true
                        example: null
                  success:
                    nullable: true
                    example: null
