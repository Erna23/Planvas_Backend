  /api/todos:
    post:
        summary: 특정 날짜의 할 일 목록 추가
        tags:
            - Schedule
        security:
            - bearerAuth: []
        parameters:
            - in: query
              name: date
              required: true  
              description: 조회할 날짜 (YYYY-MM-DD)
              schema:
                type: string
                example: "2026-02-15"
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - title
                  - category
                  - point
                  - startTime
                  - endTime
                properties:
                  title:
                    type: string
                    description: 할일일 제목
                    example: "출근 전 영어 공부"
                  category:
                    type: string
                    description: NONE, GROWTH, REST 3개 중 하나
                  point:
                    type: integer
                    description: 완료 시 받을 점수
                  startTime:
                    type: string
                    description: 시작 시각 (HH:mm)
                    example: "07:00"
                  endTime:
                    type: string
                    description: 종료 시각 (HH:mm)
                    example: "08:00"
        responses:
            "200":
            description: 생성 성공
            content:
                application/json:
                schema:
                    type: object
                    properties:
                      resultType: { type: string, example: "SUCCESS" }
                      success:
                        type: object
                        properties:
                          id: { type: integer, example: 1 }


    get:
      summary: 특정 날짜의 할 일 목록 조회
      tags:
        - Schedule
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: date
          required: true
          description: 조회할 날짜 (YYYY-MM-DD)
          schema:
            type: string
            example: "2026-02-15"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    title:
                      type: string
                      example: "출근 전 영어 공부"
                    category:
                      type: string
                      example: "GROWTH"
                    status:
                      type: string
                      example: "TODO"
                      enum: ["TODO", "DONE"]

  /api/todos/{todoId}:
    patch:
      summary: 할 일 완료 처리
      tags:
        - Schedule
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: todoId
          required: true
          description: 완료 처리할 할 일 ID
          schema:
            type: integer
      responses:
        "200":
          description: 완료 처리 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1

