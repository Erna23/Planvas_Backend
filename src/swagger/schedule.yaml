paths:
  /api/todos:
    post:
      summary: 특정 날짜의 할 일 추가
      tags:
        - Schedule
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: date
          required: true
          description: 조회할 날짜 (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2026-02-15"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TodoCreateRequest"
      responses:
        "200":
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_TodoId"

        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailResponse"

        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailResponse"

    get:
      summary: 특정 날짜의 할 일 목록 조회
      tags:
        - Schedule
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: date
          required: true
          description: 조회할 날짜 (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2026-02-15"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_TodoList"

        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailResponse"

        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailResponse"

  /api/todos/{todoId}:
    patch:
      summary: 할 일 완료 처리
      tags:
        - Schedule
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: todoId
          required: true
          description: 완료 처리할 할 일 ID
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: 완료 처리 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_TodoComplete"

        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailResponse"

        "404":
          description: 대상 Todo 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailResponse"

        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailResponse"

  /api/my-activities/{id}/complete:
    patch:
      summary: 내 활동 완료 처리 및 목표 달성도 갱신
      tags:
        - Schedule
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: 완료 처리할 내 활동 ID
          schema:
            type: integer
      responses:
        "200":
          description: 완료 처리 및 전후 성장/휴식 달성도 반환
          content:
            application/json:
              schema:
                type: object
                properties:
                  myActivityId:
                    type: integer
                    example: 10
                  beforeProgress:
                    type: object
                    properties:
                      growthAchieved:
                        type: integer
                        example: 40
                      restAchieved:
                        type: integer
                        example: 20
                  afterProgress:
                    type: object
                    properties:
                      growthAchieved:
                        type: integer
                        example: 60
                      restAchieved:
                        type: integer
                        example: 20


components:
  schemas:
    # ---------- Common ----------
    ApiFailResponse:
      type: object
      properties:
        resultType:
          type: string
          example: "FAIL"
        error:
          type: object
          properties:
            reason:
              type: string
              example: "인증 실패"
            data:
              nullable: true
              example: null
        success:
          nullable: true
          example: null

    ApiResponse_TodoId:
      type: object
      properties:
        resultType:
          type: string
          example: "SUCCESS"
        success:
          type: object
          properties:
            id:
              type: integer
              example: 1

    ApiResponse_TodoList:
      type: object
      properties:
        resultType:
          type: string
          example: "SUCCESS"
        success:
          type: array
          items:
            $ref: "#/components/schemas/TodoSummary"

    ApiResponse_TodoComplete:
      type: object
      properties:
        resultType:
          type: string
          example: "SUCCESS"
        success:
          $ref: "#/components/schemas/TodoComplete"

    # ---------- Todo ----------
    TodoCreateRequest:
      type: object
      required: [title, category, point, startTime, endTime]
      properties:
        title:
          type: string
          description: 할 일 제목
          example: "출근 전 영어 공부"
        category:
          type: string
          description: NONE, GROWTH, REST 중 하나
          enum: [NONE, GROWTH, REST]
          example: "GROWTH"
        point:
          type: integer
          description: 완료 시 받을 점수
          example: 5
        startTime:
          type: string
          description: 시작 시각 (HH:mm)
          pattern: "^(?:[01]\\d|2[0-3]):[0-5]\\d$"
          example: "07:00"
        endTime:
          type: string
          description: 종료 시각 (HH:mm)
          pattern: "^(?:[01]\\d|2[0-3]):[0-5]\\d$"
          example: "08:00"

    TodoSummary:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "출근 전 영어 공부"
        type:
          type: string
          example: "type"
        category:
          type: string
          enum: [NONE, GROWTH, REST]
          example: "GROWTH"
        point: 
          type: integer
          example: 30,
        eventColor:
          type: integer
          description: 1 ~ 10
          example: 1
        startAt:
          type: string
          example: "2026-02-17 19:00:00"
        endAt:
          type: string
          example: "2026-02-17 21:00:00"
        status:
          type: string
          enum: ["TODO", "DONE"]
          example: "TODO"

    TodoComplete:
      type: object
      description: "완료 처리 후 반환되는 todo(=userActivity) 정보"
      properties:
        id:
          type: integer
          example: 1
        status:
          type: string
          enum: ["TODO", "DONE"]
          example: "DONE"
