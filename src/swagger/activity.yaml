paths:
  /api/activities:
    get:
      summary: 활동 탐색 목록 조회
      description: 탭(성장/휴식), 검색어, 카테고리 기반 필터를 지원합니다.
      tags:
        - Activities
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: tab
          required: true
          schema:
            type: string
            enum: [GROWTH, REST]
          description: GROWTH 또는 REST
        - in: query
          name: categoryId
          required: false
          schema:
            type: integer
          description: 카테고리 필터 (선택)
        - in: query
          name: q
          required: false
          schema:
            type: string
          description: 검색어 (선택)
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: 페이지 번호 (0-base, 선택)
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: 페이지 크기 (선택)
        - in: query
          name: onlyAvailable
          required: false
          schema:
            type: boolean
            default: false
          description: 가능한 활동만 조회 (선택)

      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                required: [resultType, error, success]
                properties:
                  resultType:
                    type: string
                    example: SUCCESS
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    required: [page, size, totalElements, activities]
                    properties:
                      page:
                        type: integer
                        example: 0
                      size:
                        type: integer
                        example: 20
                      totalElements:
                        type: integer
                        example: 57
                      activities:
                        type: array
                        items:
                          type: object
                          required:
                            - activityId
                            - title
                            - category
                            - point
                            - scheduleStatus
                          properties:
                            activityId:
                              type: integer
                              example: 501
                            title:
                              type: string
                              example: 산책 20분
                            category:
                              type: string
                              enum: [GROWTH, REST]
                              example: REST
                            point:
                              type: integer
                              example: 10
                            thumbnailUrl:
                              type: string
                              nullable: true
                              example: "https://example.com/thumb.png"

                            type:
                              type: string
                              enum: [NORMAL, CONTEST]
                              nullable: true
                              example: CONTEST
                            categoryId:
                              type: integer
                              nullable: true
                              example: 201

                            startDate:
                              type: string
                              format: date
                              nullable: true
                              example: "2026-02-01"
                            endDate:
                              type: string
                              format: date
                              nullable: true
                              example: "2026-02-22"
                            dDay:
                              type: integer
                              nullable: true
                              example: 7

                            scheduleStatus:
                              type: string
                              enum: [AVAILABLE, CAUTION, CONFLICT, UNAVAILABLE]
                              example: AVAILABLE
                            tipMessage:
                              type: string
                              nullable: true
                              example: null

                            externalUrl:
                              type: string
                              nullable: true
                              example: "https://linkareer.com/activity/291335"

        "400":
          description: 요청 값이 올바르지 않습니다.
          content:
            application/json:
              schema:
                type: object
                required: [resultType, error, success]
                properties:
                  resultType:
                    type: string
                    example: FAIL
                  error:
                    type: object
                    required: [reason, data]
                    properties:
                      reason:
                        type: string
                        example: 요청 값이 올바르지 않습니다.
                      data:
                        nullable: true
                        example: null
                  success:
                    nullable: true
                    example: null

        "401":
          description: 인증 실패

        "500":
          description: 활동 목록을 불러올 수 없습니다.
          content:
            application/json:
              schema:
                type: object
                required: [resultType, error, success]
                properties:
                  resultType:
                    type: string
                    example: FAIL
                  error:
                    type: object
                    required: [reason, data]
                    properties:
                      reason:
                        type: string
                        example: 활동 목록을 불러올 수 없습니다.
                      data:
                        nullable: true
                        example: null
                  success:
                    nullable: true
                    example: null

  /api/activities/categories:
    get:
      summary: 활동 카테고리 목록 조회
      tags:
        - Activity
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: tab
          required: true
          schema:
            type: string
            enum: [GROWTH, REST]
          description: GROWTH 또는 REST
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: SUCCESS
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      tab:
                        type: string
                        example: GROWTH
                      categories:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 101
                            name:
                              type: string
                              example: 대외활동
                            count:
                              type: integer
                              example: 36
        "400":
          description: 요청 값이 올바르지 않습니다.
        "500":
          description: 카테고리 목록을 불러올 수 없습니다.

  /api/activities/recommendations:
    get:
      summary: 활동 추천 목록 조회
      description: 사용자 목표/관심사/일정 기반으로 추천 활동 목록을 조회합니다.
      tags:
        - Activities
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: tab
          required: false
          schema:
            type: string
            enum: [GROWTH, REST]
          description: GROWTH 또는 REST (선택)
        - in: query
          name: date
          required: false
          schema:
            type: string
            example: "2026-02-09"
          description: 기준 날짜 (YYYY-MM-DD, 선택)
      responses:
        "200":
          description: 추천 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: SUCCESS
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      activities:
                        type: array
                        items:
                          type: object
                          properties:
                            activityId:
                              type: integer
                              example: 601
                            title:
                              type: string
                              example: 독서 30분
                            category:
                              type: string
                              example: GROWTH
                            point:
                              type: integer
                              example: 30
                            thumbnailUrl:
                              type: string
                              nullable: true
                              example: string
        "400":
          description: 요청 값이 올바르지 않습니다.
        "401":
          description: 인증 실패
        "500":
          description: 추천 목록을 불러올 수 없습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: FAIL
                  error:
                    type: object
                    properties:
                      reason:
                        type: string
                        example: 추천 목록을 불러올 수 없습니다.
                      data:
                        nullable: true
                        example: null
                  success:
                    nullable: true
                    example: null

  /api/activities/{activityId}:
    get:
      summary: 활동 상세 조회
      description: 특정 활동의 상세 정보를 조회합니다.
      tags:
        - Activities
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: activityId
          required: true
          schema:
            type: integer
          description: 활동 ID
      responses:
        "200":
          description: 상세 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: SUCCESS
                  error:
                    nullable: true
                    example: null
                  success:
                    type: object
                    properties:
                      activityId:
                        type: integer
                        example: 601
                      title:
                        type: string
                        example: 독서 30분
                      category:
                        type: string
                        example: GROWTH
                      point:
                        type: integer
                        example: 30
                      description:
                        type: string
                        example: 하루 30분 독서를 추천합니다.
                      thumbnailUrl:
                        type: string
                        nullable: true
                        example: string
        "401":
          description: 인증 실패
        "404":
          description: 해당 활동을 찾을 수 없습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: FAIL
                  error:
                    type: object
                    properties:
                      reason:
                        type: string
                        example: 해당 활동을 찾을 수 없습니다.
                      data:
                        nullable: true
                        example: null
                  success:
                    nullable: true
                    example: null
        "500":
          description: 해당 활동을 찾을 수 없습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: FAIL
                  error:
                    type: object
                    properties:
                      reason:
                        type: string
                        example: 해당 활동을 찾을 수 없습니다.
                      data:
                        nullable: true
                        example: null
                  success:
                    nullable: true
                    example: null
  /api/activities/{activityId}/my-activities:
    post:
      summary: 내 일정(내 활동) 추가
      parameters:
        - in: path
          name: activityId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [goalId, startDate, endDate, point]
              properties:
                goalId: { type: integer, example: 3 }
                startDate: { type: string, format: date, example: "2026-02-15" }
                endDate: { type: string, format: date, example: "2026-02-15" }
                point: { type: integer, example: 30 }

      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                type: object
                required: [resultType, error, success]
                properties:
                  resultType: { type: string, example: "SUCCESS" }
                  error: { nullable: true, example: null }
                  success:
                    type: object
                    required:
                      - myActivityId
                      - activityId
                      - title
                      - category
                      - point
                      - startDate
                      - endDate
                      - scheduleStatus
                      - scheduleReason
                    properties:
                      myActivityId: { type: integer, example: 1 }
                      activityId: { type: integer, example: 2 }
                      title: { type: string, example: "[디지털 마케터] 실무 60일 완성 데마완 서포터즈" }
                      category: { type: string, enum: [GROWTH, REST], example: "GROWTH" }
                      point: { type: integer, example: 30 }
                      startDate: { type: string, format: date, example: "2026-02-15" }
                      endDate: { type: string, format: date, example: "2026-02-15" }
                      scheduleStatus:
                        type: string
                        enum: [AVAILABLE, CAUTION, CONFLICT, UNAVAILABLE]
                        example: "CAUTION"
                      scheduleReason:
                        type: string
                        example: "성장(기타/30점 포함): 기간 내 고정 일정 존재 → 주의"

        "409":
          description: 일정 충돌로 추가 불가 (교육/강연, 어학/자격증 등)
          content:
            application/json:
              schema:
                type: object
                required: [resultType, error, success]
                properties:
                  resultType: { type: string, example: "FAIL" }
                  error:
                    type: object
                    required: [errorCode, reason, data]
                    properties:
                      errorCode: { type: string, example: "SCHEDULE_CONFLICT" }
                      reason:
                        type: string
                        example: "성장(교육/강연, 어학/자격증)은 시간 조절 불가"
                      data:
                        type: object
                        properties:
                          status: { type: string, example: "CONFLICT" }
                          reason:
                            type: string
                            example: "성장(교육/강연, 어학/자격증)은 시간 조절 불가"
                  success: { nullable: true, example: null }

        "400":
          description: 요청 값이 올바르지 않습니다.
        "404":
          description: 해당 활동을 찾을 수 없습니다.
        "500":
          description: 일정 추가에 실패했습니다.