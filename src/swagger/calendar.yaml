/api/calendar/month:
  get:
    summary: 월간 일정 조회 (캘린더 뷰)
    tags:
      - Calendar
    security:
      - bearerAuth: []
    parameters:
      - in: query
        name: year
        required: true
        schema:
          type: integer
      - in: query
        name: month
        required: true
        schema:
          type: integer
    responses:
      "200":
        description: 조회 성공
        content:
          application/json:
            schema:
              type: object
              properties:
                resultType:
                  type: string
                  example: SUCCESS
                error:
                  type: object
                  nullable: true
                success:
                  type: object
                  properties:
                    year:
                      type: integer
                    month:
                      type: integer
                    days:
                      type: array
                      items:
                        type: object
                        properties:
                          date:
                            type: string
                            example: "2026-02-11"
                          hasItems:
                            type: boolean
                          itemCount:
                            type: integer
                          schedulesPreview:
                            type: array
                            items:
                              type: object
                              properties:
                                itemId:
                                  type: string
                                title:
                                  type: string
                                isFixed:
                                  type: boolean
                          moreCount:
                            type: integer
