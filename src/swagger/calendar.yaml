paths:
  /api/integrations/google-calendar/connect:
    post:
      summary: 구글 캘린더 연동 (Auth Code 전달)
      tags: 
        - Calendar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: 구글 로그인 후 받은 인증 코드
                  example: "4/0AeaYSH..."
      responses:
        "200":
          description: 연동 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: "SUCCESS"
                  success:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "연동 성공"

  /api/integrations/google-calendar/status:
    get:
      summary: 연동 상태 조회
      tags: 
        - Calendar
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: "SUCCESS"
                  success:
                    type: object
                    properties:
                      isConnected:
                        type: boolean
                        example: true

  /api/integrations/google-calendar/sync:
    post:
      summary: 구글 캘린더 일정 선택 저장 (동기화)
      description: 프론트엔드에서 선택한 일정 리스트를 받아 DB에 저장합니다.
      tags: 
        - Calendar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                events:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        description: 구글 이벤트 ID
                      summary:
                        type: string
                        description: 일정 제목
                      start:
                        type: object
                      end:
                        type: object
      responses:
        "200":
          description: 저장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: "SUCCESS"
                  success:
                    type: object
                    properties:
                      savedCount:
                        type: integer
                        example: 5

  /api/integrations/google-calendar/events:
    get:
      summary: 구글 캘린더 일정 목록 조회 (미리보기)
      description: DB 저장 전, 구글에서 직접 가져오는 미리보기 목록입니다.
      tags: 
        - Calendar
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultType:
                    type: string
                    example: "SUCCESS"
                  success:
                    type: object
                    properties:
                      events:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            title:
                              type: string

  /api/calendar/month:
    get:
      summary: 월간 일정 조회 (캘린더 뷰)
      tags: 
        - Calendar
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: year
          required: true
          schema:
            type: integer
        - in: query
          name: month
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 조회 성공

  /api/calendar/day:
    get:
      summary: 일간 일정 상세 조회 (리스트 뷰)
      tags: 
        - Calendar
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: date
          required: true
          description: "YYYY-MM-DD 형식"
          schema:
            type: string
      responses:
        "200":
          description: 조회 성공